<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="title"><title id="title">DigiBalance four step method</title><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#546A77"/><stop offset="1" stop-color="#9EAEC2"/></linearGradient></defs><rect width="720" height="480" rx="42" fill="url(#g)"/><path d="M130 238h460" stroke="#F8FAFC" stroke-width="14" stroke-linecap="round" opacity=".35"/><g><circle cx="140" cy="238" r="62" fill="#F8FAFC"/><circle cx="286" cy="238" r="62" fill="#E0E8ED"/><circle cx="432" cy="238" r="62" fill="#9EAEC2"/><circle cx="578" cy="238" r="62" fill="#698291"/></g><g font-family="Arial" font-weight="700"><text x="140" y="230" text-anchor="middle" font-size="26" fill="#546A77">1</text><text x="140" y="257" text-anchor="middle" font-size="13" fill="#698291">Notice</text><text x="286" y="230" text-anchor="middle" font-size="26" fill="#546A77">2</text><text x="286" y="257" text-anchor="middle" font-size="13" fill="#698291">Choose</text><text x="432" y="230" text-anchor="middle" font-size="26" fill="#26343C">3</text><text x="432" y="257" text-anchor="middle" font-size="13" fill="#546A77">Practice</text><text x="578" y="230" text-anchor="middle" font-size="26" fill="#fff">4</text><text x="578" y="257" text-anchor="middle" font-size="13" fill="#fff">Review</text></g><g fill="#fff" opacity=".9"><rect x="84" y="73" width="205" height="68" rx="20"/><rect x="430" y="339" width="210" height="68" rx="20"/></g><g font-family="Arial" fill="#546A77"><text x="111" y="101" font-size="15" font-weight="700">Small changes are easier</text><text x="111" y="122" font-size="12">to repeat on busy days.</text><text x="457" y="367" font-size="15" font-weight="700">Keep what actually helps</text><text x="457" y="388" font-size="12">instead of chasing perfection.</text></g></svg>
